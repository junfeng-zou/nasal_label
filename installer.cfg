"""
手术视频标注系统 - NSIS 安装包配置
使用 pynsist 创建 Windows 安装程序

优点：
- 打包后的程序真正独立，无需用户安装 Python
- 包含完整的 Python 解释器和所有依赖
- 医生只需运行安装程序，然后就能使用
"""

[Application]
name=手术视频标注系统
version=1.0.0
entry_point=launcher:start_streamlit
icon=icon.ico

[Python]
version=3.11.9
bitness=64

[Packages]
streamlit>=1.28.0
pandas>=2.0.0

[Include]
files=annotation_app.py
      config.json
      videos

[Build]
installer_name=手术视频标注系统_安装程序
nsi_template=installer.nsi.tmpl