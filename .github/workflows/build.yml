name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller streamlit pandas

    - name: Build EXE
      shell: pwsh
      run: |
        # 使用 PyInstaller 打包
        pyinstaller --name="手术视频标注系统" --onedir --clean --noconfirm launcher.py

        # 复制额外文件
        Copy-Item annotation_app.py -Destination "dist\手术视频标注系统\"
        Copy-Item config.json -Destination "dist\手术视频标注系统\"

        # 确保 videos 目录存在
        New-Item -ItemType Directory -Force -Path "dist\手术视频标注系统\videos"

    - name: Create ZIP archive
      shell: pwsh
      run: |
        Compress-Archive -Path "dist\手术视频标注系统" -DestinationPath "dist\手术视频标注系统.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: dist/手术视频标注系统.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/手术视频标注系统.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}