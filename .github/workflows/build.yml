name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Build EXE
      shell: pwsh
      run: |
        python build.py
        if (!(Test-Path "dist\手术视频标注系统\手术视频标注系统.exe")) {
          throw "未找到打包后的 exe"
        }

    - name: Create ZIP archive
      shell: pwsh
      run: |
        if (Test-Path "dist\手术视频标注系统.zip") {
          Remove-Item "dist\手术视频标注系统.zip" -Force
        }
        Compress-Archive -Path "dist\手术视频标注系统" -DestinationPath "dist\手术视频标注系统.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-package
        path: dist/手术视频标注系统.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/手术视频标注系统.zip
        body: |
          # 手术视频标注系统

          ## 下载说明
          下载 `手术视频标注系统.zip` 并解压。

          ## 使用方法
          1. 将需要标注的视频放入 `videos` 文件夹
          2. 双击 `手术视频标注系统.exe`
          3. 等待浏览器自动打开

          ## 输出数据
          标注结果会保存到同级 `annotations.json`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
