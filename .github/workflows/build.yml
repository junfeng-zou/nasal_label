name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller streamlit pandas

    - name: Build EXE
      run: |
        pyinstaller --name="手术视频标注系统" --onedir --clean --noconfirm launcher.py
        copy annotation_app.py dist\手术视频标注系统\
        copy config.json dist\手术视频标注系统\
        if not exist "dist\手术视频标注系统\videos" mkdir dist\手术视频标注系统\videos

    - name: Create ZIP archive
      run: |
        cd dist
        powershell Compress-Archive -Path '手术视频标注系统' -DestinationPath '手术视频标注系统.zip'

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: dist/手术视频标注系统.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/手术视频标注系统.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}