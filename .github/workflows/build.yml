name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: '可选：填写 v1.0.3 这类版本号时，会同时创建 GitHub Release'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Build EXE
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8
        python build.py
        if (!(Test-Path "dist\手术视频标注系统\手术视频标注系统.exe")) {
          throw "EXE file was not generated"
        }

    - name: Create ZIP archive
      shell: pwsh
      run: |
        if (Test-Path "dist\nasal-label-windows.zip") {
          Remove-Item "dist\nasal-label-windows.zip" -Force
        }
        Compress-Archive -Path "dist\手术视频标注系统" -DestinationPath "dist\nasal-label-windows.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nasal-label-windows
        path: dist/nasal-label-windows.zip
        compression-level: 0

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        target_commitish: ${{ github.sha }}
        files: dist/nasal-label-windows.zip
        body: |
          # 手术视频标注系统

          ## 下载说明
          下载 `nasal-label-windows.zip` 并解压。

          ## 使用方法
          1. 将需要标注的视频放入 `videos` 文件夹
          2. 双击 `手术视频标注系统.exe`
          3. 等待浏览器自动打开

          ## 输出数据
          标注结果会保存到同级 `annotations.json`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
